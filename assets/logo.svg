<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" width="140" height="160">

  <!-- ── BODY (behind hat) ── -->
  <rect x="44" y="108" width="52" height="28" rx="5" fill="#6AADE4"/>

  <!-- ── FEET ── -->
  <rect x="48" y="130" width="18" height="18" rx="5" fill="#4A8FC4"/>
  <rect x="74" y="130" width="18" height="18" rx="5" fill="#4A8FC4"/>

  <!-- ── HAT DOME — massive, covers most of the image ── -->
  <ellipse cx="70" cy="72" rx="66" ry="62" fill="#FFCC00"/>

  <!-- Hat dome highlight -->
  <ellipse cx="52" cy="47" rx="26" ry="17" fill="#FFE566" opacity="0.5"/>

  <!-- Hat dome outline -->
  <ellipse cx="70" cy="72" rx="66" ry="62" fill="none" stroke="#B8860B" stroke-width="2.5"/>

  <!-- ── BRIM — wide flat shelf ── -->
  <ellipse cx="70" cy="120" rx="70" ry="11" fill="#E6AA00"/>
  <ellipse cx="70" cy="118" rx="70" ry="11" fill="#FFCC00"/>
  <ellipse cx="70" cy="116" rx="70" ry="10" fill="#E6AA00"/>
  <ellipse cx="70" cy="116" rx="70" ry="10" fill="none" stroke="#B8860B" stroke-width="2"/>

  <!-- ── RIVET on top ── -->
  <circle cx="70" cy="14" r="5.5" fill="#B8860B"/>
  <circle cx="70" cy="14" r="3" fill="#FFE566"/>

  <!-- ── EYES — goggle style, peeking under brim ── -->
  <circle cx="55" cy="118" r="12" fill="white"/>
  <circle cx="85" cy="118" r="12" fill="white"/>
  <!-- pupils -->
  <circle cx="55" cy="119" r="7" fill="#111"/>
  <circle cx="85" cy="119" r="7" fill="#111"/>
  <!-- shine -->
  <circle cx="59" cy="115" r="2.5" fill="white"/>
  <circle cx="89" cy="115" r="2.5" fill="white"/>

</svg>
